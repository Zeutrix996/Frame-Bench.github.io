<svg xmlns="http://www.w3.org/2000/svg" width="190" height="36" viewBox="0 0 190 36">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffd5"/>
      <stop offset="100%" style="stop-color:#00c4a8"/>
    </linearGradient>
  </defs>
  
  <!-- Chip/Processor symbol -->
  <g transform="translate(4, 6)">
    <!-- Chip body -->
    <rect x="0" y="0" width="24" height="24" 
          fill="url(#logoGradient)" 
          rx="3"/>
    
    <!-- Inner square -->
    <rect x="6" y="6" width="12" height="12" 
          fill="#041a1d" 
          rx="2"/>
    
    <!-- Chip pins - left -->
    <rect x="-3" y="4" width="3" height="2" fill="#00ffd5"/>
    <rect x="-3" y="11" width="3" height="2" fill="#00ffd5"/>
    <rect x="-3" y="18" width="3" height="2" fill="#00ffd5"/>
    
    <!-- Chip pins - right -->
    <rect x="24" y="4" width="3" height="2" fill="#00ffd5"/>
    <rect x="24" y="11" width="3" height="2" fill="#00ffd5"/>
    <rect x="24" y="18" width="3" height="2" fill="#00ffd5"/>
    
    <!-- Chip pins - top -->
    <rect x="4" y="-3" width="2" height="3" fill="#00ffd5"/>
    <rect x="11" y="-3" width="2" height="3" fill="#00ffd5"/>
    <rect x="18" y="-3" width="2" height="3" fill="#00ffd5"/>
    
    <!-- Chip pins - bottom -->
    <rect x="4" y="24" width="2" height="3" fill="#00ffd5"/>
    <rect x="11" y="24" width="2" height="3" fill="#00ffd5"/>
    <rect x="18" y="24" width="2" height="3" fill="#00ffd5"/>
  </g>
  
  <!-- FrameBench text -->
  <text x="38" y="24" 
        font-family="Arial, sans-serif" 
        font-size="22" 
        font-weight="700" 
        fill="#7de2d1"
        letter-spacing="0.5">
    FrameBench
  </text>
</svg>
