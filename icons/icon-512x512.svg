<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#041a1d"/>
      <stop offset="100%" style="stop-color:#0a2e33"/>
    </linearGradient>
    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffd5"/>
      <stop offset="100%" style="stop-color:#00c4a8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGradient)" rx="80"/>
  
  <!-- Chip/Processor symbol centered -->
  <g transform="translate(256, 256)">
    <!-- Chip body -->
    <rect x="-128" y="-128" width="256" height="256" 
          fill="url(#chipGradient)" 
          rx="32"/>
    
    <!-- Inner square -->
    <rect x="-64" y="-64" width="128" height="128" 
          fill="#041a1d" 
          rx="20"/>
    
    <!-- Chip pins - left -->
    <rect x="-160" y="-64" width="32" height="20" fill="#00ffd5" rx="4"/>
    <rect x="-160" y="-24" width="32" height="20" fill="#00ffd5" rx="4"/>
    <rect x="-160" y="16" width="32" height="20" fill="#00ffd5" rx="4"/>
    <rect x="-160" y="56" width="32" height="20" fill="#00ffd5" rx="4"/>
    
    <!-- Chip pins - right -->
    <rect x="128" y="-64" width="32" height="20" fill="#00ffd5" rx="4"/>
    <rect x="128" y="-24" width="32" height="20" fill="#00ffd5" rx="4"/>
    <rect x="128" y="16" width="32" height="20" fill="#00ffd5" rx="4"/>
    <rect x="128" y="56" width="32" height="20" fill="#00ffd5" rx="4"/>
    
    <!-- Chip pins - top -->
    <rect x="-64" y="-160" width="20" height="32" fill="#00ffd5" rx="4"/>
    <rect x="-24" y="-160" width="20" height="32" fill="#00ffd5" rx="4"/>
    <rect x="16" y="-160" width="20" height="32" fill="#00ffd5" rx="4"/>
    <rect x="56" y="-160" width="20" height="32" fill="#00ffd5" rx="4"/>
    
    <!-- Chip pins - bottom -->
    <rect x="-64" y="128" width="20" height="32" fill="#00ffd5" rx="4"/>
    <rect x="-24" y="128" width="20" height="32" fill="#00ffd5" rx="4"/>
    <rect x="16" y="128" width="20" height="32" fill="#00ffd5" rx="4"/>
    <rect x="56" y="128" width="20" height="32" fill="#00ffd5" rx="4"/>
    
    <!-- FB text in center -->
    <text x="0" y="20" 
          font-family="Arial, sans-serif" 
          font-size="88" 
          font-weight="bold" 
          fill="#00ffd5" 
          text-anchor="middle">FB</text>
  </g>
</svg>
