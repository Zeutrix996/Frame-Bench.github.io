<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffd5"/>
      <stop offset="100%" style="stop-color:#00c4a8"/>
    </linearGradient>
  </defs>
  
  <!-- Chip/Processor symbol centered -->
  <g transform="translate(16, 16)">
    <!-- Chip body -->
    <rect x="-8" y="-8" width="16" height="16" 
          fill="url(#chipGradient)" 
          rx="3"/>
    
    <!-- Inner square -->
    <rect x="-4" y="-4" width="8" height="8" 
          fill="#041a1d" 
          rx="2"/>
    
    <!-- Chip pins - left -->
    <rect x="-11" y="-4" width="3" height="2" fill="#00ffd5" rx="0.5"/>
    <rect x="-11" y="0" width="3" height="2" fill="#00ffd5" rx="0.5"/>
    <rect x="-11" y="4" width="3" height="2" fill="#00ffd5" rx="0.5"/>
    
    <!-- Chip pins - right -->
    <rect x="8" y="-4" width="3" height="2" fill="#00ffd5" rx="0.5"/>
    <rect x="8" y="0" width="3" height="2" fill="#00ffd5" rx="0.5"/>
    <rect x="8" y="4" width="3" height="2" fill="#00ffd5" rx="0.5"/>
    
    <!-- Chip pins - top -->
    <rect x="-4" y="-11" width="2" height="3" fill="#00ffd5" rx="0.5"/>
    <rect x="0" y="-11" width="2" height="3" fill="#00ffd5" rx="0.5"/>
    <rect x="4" y="-11" width="2" height="3" fill="#00ffd5" rx="0.5"/>
    
    <!-- Chip pins - bottom -->
    <rect x="-4" y="8" width="2" height="3" fill="#00ffd5" rx="0.5"/>
    <rect x="0" y="8" width="2" height="3" fill="#00ffd5" rx="0.5"/>
    <rect x="4" y="8" width="2" height="3" fill="#00ffd5" rx="0.5"/>
  </g>
</svg>
