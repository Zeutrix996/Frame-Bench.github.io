<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking – FrameBench</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="icon" type="image/x-icon" href="../favicon.ico">
</head>
<body>

<div id="site-header" data-base="../" data-page="ranking"></div>

<main class="container">
  <h1>Hardware Ranking</h1>
  <p class="small">Top-Listen nach Performance-Score.</p>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="gpu">GPUs</button>
    <button class="tab-btn" data-tab="cpu">CPUs</button>
  </div>

  <div class="card">
    <div id="rank" class="rank-list"></div>
  </div>
</main>

<!-- GPU Detail Modal -->
<div id="gpu-modal" class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <div id="gpu-modal-body"></div>
  </div>
</div>

<script src="../js/amd-gpu.js"></script>
<script src="../js/nvidia-gpu.js"></script>
<script src="../js/amd-cpu.js"></script>
<script src="../js/intel-cpu.js"></script>
<script src="../js/data.js"></script>
<script src="../js/header.js"></script>
<script src="../js/gpu-detail.js"></script>
<script src="../js/ranking.js"></script>
</body>
</html>
