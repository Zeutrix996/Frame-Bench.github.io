<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS Rechner – FrameBench</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="icon" type="image/x-icon" href="../favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="site-header" data-base="../" data-page="fps"></div>

<main class="container">
  <h1>FPS Rechner</h1>
  <p class="small">Schätze deine FPS basierend auf Hardware und Einstellungen.</p>

  <div class="group">
    <h3>Hardware</h3>
    <input id="gpuInput" list="gpuList" placeholder="GPU eingeben...">
    <datalist id="gpuList"></datalist>
    <input id="cpuInput" list="cpuList" placeholder="CPU eingeben...">
    <datalist id="cpuList"></datalist>
  </div>

  <div class="group">
    <h3>Grafik</h3>
    <select id="resolution">
      <option value="1080">1080p</option>
      <option value="1440">1440p</option>
      <option value="4k">4K</option>
    </select>
    <select id="quality">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
      <option value="ultra">Ultra</option>
    </select>
    <select id="raytracing">
      <option value="off">RT OFF</option>
      <option value="on">RT ON</option>
    </select>
  </div>

  <div class="group">
    <h3>RAM</h3>
    <select id="ramType">
      <option value="DDR4">DDR4</option>
      <option value="DDR5">DDR5</option>
    </select>
    <input id="ramSize" type="number" value="16" min="8">
  </div>

  <div class="group">
    <h3>Spiel</h3>
    <select id="game">
      <option value="cyberpunk">Cyberpunk</option>
      <option value="warzone">Warzone</option>
      <option value="fortnite">Fortnite</option>
    </select>
  </div>

  <button onclick="calcFPS()">FPS berechnen</button>
  <div id="out"></div>
</main>

<div id="site-footer" data-base="../" data-page="fps"></div>

<script src="../js/amd-gpu.js"></script>
<script src="../js/nvidia-gpu.js"></script>
<script src="../js/amd-cpu.js"></script>
<script src="../js/intel-cpu.js"></script>
<script src="../js/data.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/header.js"></script>
<script src="../js/footer.js"></script>
<script src="../js/fps.js"></script>
</body>
</html>
