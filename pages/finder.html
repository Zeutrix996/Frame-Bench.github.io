<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware Finder – FrameBench</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="icon" type="image/x-icon" href="../favicon.ico">
</head>
<body>

<div id="site-header" data-base="../" data-page="finder"></div>

<main class="container">
  <h1>Hardware Finder</h1>
  <p class="small">Finde die beste Hardware für dein Budget.</p>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('gpu')">GPU</button>
    <button class="tab-btn" onclick="switchTab('cpu')">CPU</button>
  </div>

  <div id="gpu-search" class="card">
    <label for="budget">Budget (€)</label>
    <input id="budget" type="number" value="300" min="50" step="10">
    <button onclick="findGPU()">GPU suchen</button>
  </div>

  <div id="cpu-search" class="card" style="display:none;">
    <label for="cpu-budget">Budget (€)</label>
    <input id="cpu-budget" type="number" value="200" min="50" step="10">
    <button onclick="findCPU()">CPU suchen</button>
  </div>

  <div id="out"></div>
</main>

<!-- GPU Detail Modal -->
<div id="gpu-modal" class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <div id="gpu-modal-body"></div>
  </div>
</div>

<!-- CPU Detail Modal -->
<div id="cpu-modal" class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <div id="cpu-modal-body"></div>
  </div>
</div>

<div id="site-footer" data-base="../" data-page="finder"></div>

<script src="../js/amd-gpu.js"></script>
<script src="../js/nvidia-gpu.js"></script>
<script src="../js/amd-cpu.js"></script>
<script src="../js/intel-cpu.js"></script>
<script src="../js/data.js"></script>
<script src="../js/header.js"></script>
<script src="../js/footer.js"></script>
<script src="../js/gpu-detail.js"></script>
<script src="../js/cpu-detail.js"></script>
<script src="../js/finder.js"></script>
</body>
</html>
